<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO</title>
</head>
<body>
    <h1>Мой список задач</h1>

    <div>
        <input type="text" id="taskInput" placeholder="Введите задачу...">
        <select id="prioritySelect">
            <option value="low">Низкий</option>
            <option value="medium" selected>Средний</option>
            <option value="high">Высокий</option>
        </select>
        <button id="addTaskBtn">Добавить</button>
    </div>

    <div style="margin-top: 20px;">
        <input type="text" id="searchInput" placeholder="Поиск задач...">
        <button class="filter-btn" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="active">Активные</button>
        <button class="filter-btn" data-filter="completed">Завершённые</button>
    </div>

    <ul id="taskList" style="margin-top: 20px; padding-left: 20px;"></ul>

    <script>
        (function() {
            "use strict";

            let tasks = [];

            let currentFilter = 'all';

            let searchQuery = '';

            const taskInput = document.getElementById('taskInput');
            const prioritySelect = document.getElementById('prioritySelect');
            const addTaskBtn = document.getElementById('addTaskBtn');
            const searchInput = document.getElementById('searchInput');
            const taskList = document.getElementById('taskList');
            const filterBtns = document.querySelectorAll('.filter-btn');

            function loadTasksFromStorage() {
                const stored = localStorage.getItem('todoTasks');
                if (stored) {
                    try {
                        tasks = JSON.parse(stored);
                    } catch (e) {
                        console.warn('Ошибка чтения localStorage, начинаем с пустого массива');
                        tasks = [];
                    }
                } else {

                    tasks = [
                        { id: '1', text: 'Изучить JavaScript', completed: false, priority: 'high' },
                        { id: '2', text: 'Сделать туду лист', completed: true, priority: 'medium' },
                        { id: '3', text: 'Погулять с собакой', completed: false, priority: 'low' }
                    ];
                }

                tasks = tasks.map(task => ({
                    ...task,
                    priority: task.priority || 'medium'
                }));
            }

            function saveTasksToStorage() {
                localStorage.setItem('todoTasks', JSON.stringify(tasks));
            }

            function generateId() {
                return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            }

            function getFilteredTasks() {
                let filtered = tasks.filter(task => {
                    if (currentFilter === 'active') return !task.completed;
                    if (currentFilter === 'completed') return task.completed;
                    return true;
                });

                if (searchQuery.trim() !== '') {
                    const query = searchQuery.trim().toLowerCase();
                    filtered = filtered.filter(task => 
                        task.text.toLowerCase().includes(query)
                    );
                }

                return filtered;
            }

            function render() {
                const filteredTasks = getFilteredTasks();
                
                taskList.innerHTML = '';

                if (filteredTasks.length === 0) {
                    const emptyMessage = document.createElement('li');
                    emptyMessage.textContent = 'Нет задач для отображения';
                    emptyMessage.style.listStyle = 'none';
                    emptyMessage.style.fontStyle = 'italic';
                    taskList.appendChild(emptyMessage);
                    return;
                }

                filteredTasks.forEach(task => {
                    const li = document.createElement('li');
                    li.dataset.id = task.id;
                    li.style.marginBottom = '8px';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = task.completed;
                    checkbox.addEventListener('change', (e) => {

                        e.stopPropagation();
                        toggleTaskStatus(task.id);
                    });


                    const textSpan = document.createElement('span');
                    textSpan.textContent = task.text;
                    textSpan.style.marginLeft = '8px';
                    textSpan.style.marginRight = '12px';
                    if (task.completed) {
                        textSpan.style.textDecoration = 'line-through';
                        textSpan.style.color = '#666';
                    }


                    const prioritySpan = document.createElement('span');
                    prioritySpan.textContent = `[${getPriorityLabel(task.priority)}]`;
                    prioritySpan.style.marginRight = '12px';
                    prioritySpan.style.fontWeight = 'bold';


                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Редактировать';
                    editBtn.style.marginRight = '6px';
                    editBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        editTask(task.id);
                    });

                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = 'Удалить';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteTask(task.id);
                    });

                    li.appendChild(checkbox);
                    li.appendChild(textSpan);
                    li.appendChild(prioritySpan);
                    li.appendChild(editBtn);
                    li.appendChild(deleteBtn);

                    taskList.appendChild(li);
                });
            }

            function getPriorityLabel(priority) {
                switch (priority) {
                    case 'high': return 'Высокий';
                    case 'medium': return 'Средний';
                    case 'low': return 'Низкий';
                    default: return 'Средний';
                }
            }


            function addTask() {
                const text = taskInput.value.trim();
                if (text === '') {
                    alert('Пожалуйста, введите текст задачи');
                    return;
                }

                const priority = prioritySelect.value;

                const newTask = {
                    id: generateId(),
                    text: text,
                    completed: false,
                    priority: priority
                };

                tasks.push(newTask);
                saveTasksToStorage();
                
                taskInput.value = '';

                prioritySelect.value = 'medium';
                
                render();
            }

            function deleteTask(id) {
                tasks = tasks.filter(task => task.id !== id);
                saveTasksToStorage();
                render();
            }

            function toggleTaskStatus(id) {
                const task = tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    saveTasksToStorage();
                    render();
                }
            }

            function editTask(id) {
                const task = tasks.find(t => t.id === id);
                if (!task) return;

                const newText = prompt('Измените текст задачи:', task.text);
                if (newText !== null && newText.trim() !== '') {
                    task.text = newText.trim();
                    saveTasksToStorage();
                    render();
                } else if (newText !== null && newText.trim() === '') {
                    alert('Текст задачи не может быть пустым');
                }
            }

            addTaskBtn.addEventListener('click', addTask);

            taskInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addTask();
                }
            });

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                render();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const filter = btn.getAttribute('data-filter');
                    if (filter) {
                        currentFilter = filter;
                        render();
                    }
                });
            });

            function init() {
                loadTasksFromStorage();
                render();
            }

            init();

        })();
    </script>
</body>
</html>
